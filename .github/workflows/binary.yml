name: Binary Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build binary
        run: |
          bash scripts/build_binary.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autohack-binary
          path: |
            dist/autohack
            dist/autohack.sha256
