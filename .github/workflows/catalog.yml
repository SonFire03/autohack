name: Catalog Validation

on:
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "commands_catalog.json"
      - "commands_catalog.sig"
      - "core/catalog.py"
      - "core/catalog_schema.py"
      - "scripts/build_catalog.py"
      - "scripts/validate_catalog_schema.py"
      - ".github/workflows/catalog.yml"
  pull_request:
    branches: [main]
    paths:
      - "catalog/**"
      - "commands_catalog.json"
      - "commands_catalog.sig"
      - "core/catalog.py"
      - "core/catalog_schema.py"
      - "scripts/build_catalog.py"
      - "scripts/validate_catalog_schema.py"
      - ".github/workflows/catalog.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check generated catalog
        run: |
          python scripts/build_catalog.py --check

      - name: Validate catalog schema
        run: |
          python scripts/validate_catalog_schema.py

      - name: Run catalog tests
        run: |
          python -m pytest tests/test_build_catalog.py tests/test_catalog.py -q
