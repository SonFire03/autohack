name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (ex: v0.3.0)"
        required: true
      target:
        description: "Target branch or commit"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.target }}
          generate_release_notes: true
